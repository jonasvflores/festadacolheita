<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Gincana Colheita</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .admin-container {
            max-width: 600px;
            margin: 2rem auto;
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        input { 
            width: 100%; 
            padding: 0.8rem; 
            border: 1px solid #ccc; 
            border-radius: 8px;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 1rem;
            background: var(--secondary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1rem;
        }
        button:hover { background: #d35400; }
        .team-edit {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #eee;
        }
        .team-edit input[type="number"] { width: 100px; }
        #status { margin-top: 1rem; text-align: center; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>Painel de Administração</h1>
        <p>Atualize os pontos da gincana aqui.</p>
        <hr style="margin: 1.5rem 0;">

        <div id="login-section">
            <div class="form-group">
                <label>GitHub Personal Access Token (Classic):</label>
                <input type="password" id="github-token" placeholder="ghp_xxxxxxxxxxxx">
                <small>Necessário para salvar os dados no GitHub Pages.</small>
            </div>
            <div class="form-group">
                <label>Repositório (usuário/nome):</label>
                <input type="text" id="repo-path" placeholder="seu-usuario/nome-do-repo">
            </div>
            <button onclick="startAdmin()">Entrar</button>
        </div>

        <div id="admin-section" class="hidden">
            <div id="teams-list"></div>
            <button onclick="saveData()" id="btn-save">Salvar Alterações</button>
            <div id="status"></div>
        </div>
    </div>

    <script>
        let currentData = null;
        let fileSha = null;

        async function startAdmin() {
            const token = document.getElementById('github-token').value;
            const repo = document.getElementById('repo-path').value;

            if (!token || !repo) {
                alert('Por favor, preencha o token e o caminho do repositório.');
                return;
            }

            document.getElementById('status').innerText = 'Carregando dados...';

            try {
                const response = await fetch(`https://api.github.com/repos/${repo}/contents/data.json`, {
                    headers: { 'Authorization': `token ${token}` }
                });

                if (!response.ok) throw new Error('Erro ao acessar repositório. Verifique o token e o caminho.');

                const fileData = await response.json();
                fileSha = fileData.sha;
                currentData = JSON.parse(atob(fileData.content));

                renderAdminTeams();
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('admin-section').classList.remove('hidden');
                document.getElementById('status').innerText = '';
            } catch (error) {
                document.getElementById('status').innerText = error.message;
            }
        }

        function renderAdminTeams() {
            const list = document.getElementById('teams-list');
            list.innerHTML = currentData.teams.map((team, index) => `
                <div class="team-edit">
                    <span style="flex-grow:1; font-weight:bold;">${team.name}</span>
                    <input type="number" value="${team.score}" onchange="updateScore(${index}, this.value)">
                </div>
            `).join('');
        }

        function updateScore(index, value) {
            currentData.teams[index].score = parseInt(value);
        }

        async function saveData() {
            const token = document.getElementById('github-token').value;
            const repo = document.getElementById('repo-path').value;
            const btn = document.getElementById('btn-save');
            const status = document.getElementById('status');

            btn.disabled = true;
            status.innerText = 'Salvando no GitHub...';

            try {
                const content = btoa(unescape(encodeURIComponent(JSON.stringify(currentData, null, 2))));
                
                const response = await fetch(`https://api.github.com/repos/${repo}/contents/data.json`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: 'Atualização de pontuação via Painel Admin',
                        content: content,
                        sha: fileSha
                    })
                });

                if (!response.ok) throw new Error('Erro ao salvar. Tente novamente.');

                const result = await response.json();
                fileSha = result.content.sha;
                status.style.color = 'green';
                status.innerText = '✅ Salvo com sucesso! O site atualizará em instantes.';
            } catch (error) {
                status.style.color = 'red';
                status.innerText = error.message;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
